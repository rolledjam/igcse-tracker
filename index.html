<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>IGCSE Pastel Tracker 2026</title>
    <link href='https://fonts.googleapis.com' rel='stylesheet'>
    <style>
        :root { 
            --bg: #fdfdfd; --card: #ffffff; --text: #444; --border: #f0f0f0;
            --math: #b3e5fc; --phys: #fff3cd; --chem: #d4edda; --bio: #f8bbd0;
            --current: #f8f9fa;
        }
        body.dark-mode { 
            --bg: #1a1a1a; --card: #2d2d2d; --text: #fefefe; --border: #444;
            --math: #0277bd; --phys: #f9a825; --chem: #2e7d32; --bio: #c2185b;
            --current: #1a1a1a;
        }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; transition: 0.3s; display: flex; flex-direction: column; }
        header { padding: 20px 40px; background: var(--card); border-bottom: 5px solid var(--current); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        h1 { font-family: 'Fredoka', sans-serif; margin: 0; font-size: 1.6rem; }
        .mode-toggle { background: var(--bg); border: 2px solid var(--border); padding: 8px 15px; border-radius: 50px; cursor: pointer; font-family: 'Fredoka'; color: var(--text); font-weight: 600; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; width: 100%; box-sizing: border-box; flex: 1; }
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .sub-card { background: var(--card); border: 5px solid var(--border); border-radius: 30px; padding: 35px 20px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 0 var(--border); }
        .sub-card.selected { border-color: #81c784; box-shadow: 0 10px 0 #81c784; }
        
        #trackerView { display: none; }
        .tab-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
        .tab-item { padding: 12px 25px; background: var(--card); border: 2px solid var(--border); border-radius: 50px; cursor: pointer; font-family: 'Fredoka'; white-space: nowrap; }
        .tab-item.active { background: var(--current); border-color: var(--text); }

        .card { background: var(--card); border-radius: 30px; padding: 25px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 15px; background: rgba(0,0,0,0.03); border-radius: 15px; text-align: center; font-weight: 700; }
        .mark-box { background: var(--card); border: 2px solid var(--border); color: var(--text); width: 60px; text-align: center; padding: 8px; border-radius: 12px; font-weight: 800; font-family: 'Fredoka'; outline: none; }

        .nav-btn { position: fixed; bottom: 30px; right: 30px; background: #444; color: #fff; padding: 20px 40px; border-radius: 60px; font-weight: 700; cursor: pointer; border: none; font-family: 'Fredoka'; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1001; }
        .back-btn { position: fixed; bottom: 30px; left: 30px; background: var(--card); color: var(--text); padding: 15px 30px; border-radius: 60px; cursor: pointer; border: 2px solid var(--border); font-family: 'Fredoka'; z-index: 1001; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        #drawer { position: fixed; right: -450px; top: 0; width: 400px; height: 100%; background: var(--card); border-left: 10px solid var(--current); padding: 40px; transition: 0.4s; z-index: 2000; overflow-y: auto; box-sizing: border-box; }
        #drawer.open { right: 0; }
        textarea { width: 100%; height: 200px; background: var(--bg); border: 2px solid var(--border); color: var(--text); padding: 15px; border-radius: 15px; font-family: inherit; }
        .save-btn { width: 100%; padding: 18px; background: #444; color: #fff; font-weight: 700; border: none; border-radius: 15px; font-family: 'Fredoka'; cursor: pointer; margin-top: 20px; }
        footer { padding: 40px; text-align: center; opacity: 0.5; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div style="width: 100px;"></div>
    <h1>IGCSE SYSTEM 2026</h1>
    <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">🌙 DARK</button>
</header>

<div class="container" id="homeView">
    <div style="text-align: center; margin-bottom: 40px;">
        <input type="text" id="mainSearch" placeholder="Enter Subject Name or Code" onkeyup="filterGrid()" style="width: 100%; max-width: 500px; padding: 18px; border: 4px solid var(--border); border-radius: 50px; background: var(--card); color: var(--text); font-family: 'Fredoka'; font-size: 1rem; text-align: center; outline: none;">
    </div>
    <div id="dashboard"></div>
</div>

<div class="container" id="trackerView">
    <div class="tab-bar" id="trackerTabs"></div>
    <div class="card"><table><thead><tr id="hRow"></tr></thead><tbody id="tBody"></tbody></table></div>
</div>

<button class="nav-btn" id="startBtn" onclick="launchTracker()" style="display:none;">START TRACKING (0)</button>
<button class="back-btn" id="backBtn" onclick="location.reload()" style="display:none;">← DASHBOARD</button>

<div id="overlay" onclick="closeDrawer()"></div>
<div id="drawer">
    <h2 style="font-family: Fredoka;">Mistake Log</h2>
    <textarea id="nArea" placeholder="Notes..."></textarea>
    <button class="save-btn" onclick="saveData()">SAVE PROGRESS</button>
</div>

<footer>MADE BY ROLLEDJAM &copy; 2026</footer>

<script>
    const subjects = [
        { n: "Mathematics", c: "0580", p: [2, 4], m: (y) => y >= 2025 ? {2:100, 4:100} : {2:70, 4:130}, color: "var(--math)" },
        { n: "Physics", c: "0625", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}), color: "var(--phys)" },
        { n: "Chemistry", c: "0620", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}), color: "var(--chem)" },
        { n: "Biology", c: "0610", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}), color: "var(--bio)" },
        { n: "ICT", c: "0417", p: [1, 2, 3], m: (y) => ({1:80, 2:70, 3:70}), color: "var(--phys)" },
        { n: "Computer Science", c: "0478", p: [1, 2], m: (y) => ({1:75, 2:75}), color: "var(--phys)" },
        { n: "Additional Maths", c: "0606", p: [1, 2], m: (y) => ({1:80, 2:80}), color: "var(--math)" },
        { n: "Business Studies", c: "0450", p: [1, 2], m: (y) => y >= 2020 ? {1:80, 2:80} : {1:100, 2:100}, color: "var(--math)" },
        { n: "Environmental Mgmt", c: "0680", p: [1, 2], m: (y) => ({1:80, 2:80}), color: "var(--chem)" }
    ];

    let selectedIdx = [], activeIdx = -1, activePaperID = '';

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        btn.innerText = body.classList.contains('dark-mode') ? "☀️ LIGHT" : "🌙 DARK";
    }

    function init() {
        const grid = document.getElementById('dashboard');
        grid.innerHTML = '';
        subjects.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'sub-card';
            card.innerHTML = `<p style="font-weight:800; opacity:0.4;">${s.c}</p><h3>${s.n}</h3>`;
            card.onclick = () => {
                if(selectedIdx.includes(i)) {
                    selectedIdx = selectedIdx.filter(x => x !== i);
                    card.classList.remove('selected');
                } else {
                    selectedIdx.push(i);
                    card.classList.add('selected');
                }
                const btn = document.getElementById('startBtn');
                btn.style.display = selectedIdx.length > 0 ? 'block' : 'none';
                btn.innerText = `START TRACKING (${selectedIdx.length})`;
            };
            grid.appendChild(card);
        });
    }

    function filterGrid() {
        const val = document.getElementById('mainSearch').value.toUpperCase();
        document.querySelectorAll('.sub-card').forEach(c => c.style.display = c.innerText.toUpperCase().includes(val) ? 'block' : 'none');
    }

    function launchTracker() {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('trackerView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        const bar = document.getElementById('trackerTabs');
        bar.innerHTML = '';
        selectedIdx.forEach(idx => {
            const t = document.createElement('div');
            t.className = 'tab-item';
            t.innerText = subjects[idx].n;
            t.onclick = () => { 
                activeIdx = idx; 
                document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active')); 
                t.classList.add('active'); 
                renderTable(); 
            };
            bar.appendChild(t);
        });
        if(bar.firstChild) bar.firstChild.click();
    }

    function renderTable() {
        const s = subjects[activeIdx];
        document.documentElement.style.setProperty('--current', s.color);
        const hRow = document.getElementById('hRow');
        hRow.innerHTML = `<th>Year</th><th>Series</th><th>Var</th>` + s.p.map(pNum => `<th>P${pNum}</th>`).join('');
        
        const tbody = document.getElementById('tBody');
        tbody.innerHTML = '';
        
        for (let y = 2026; y >= 2010; y--) {
            const marks = s.m(y);
            ['Feb/Mar', 'May/Jun', 'Oct/Nov'].forEach(sess => {
                // Feb/Mar only has Variant 2
                const variants = (sess === 'Feb/Mar') ? [2] : [1, 2, 3];
                
                variants.forEach(v => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td style="font-weight:800; font-family:Fredoka;">${y}</td><td style="color:#aaa;font-size:11px">${sess}</td><td style="color:#ccc">V${v}</td>`;
                    
                    s.p.forEach(pNum => {
                        const id = `RJ-${s.c}-${y}-${sess}-${v}-p${pNum}`;
                        const savedScore = localStorage.getItem(id + '-m') || '';
                        tr.innerHTML += `<td>
                            <input type="checkbox" ${localStorage.getItem(id)?'checked':''} onchange="localStorage.setItem('${id}', this.checked)">
                            <input type="number" class="mark-box" value="${savedScore}" oninput="valInput(this, ${marks[pNum]}, '${id}')">
                            <span style="font-size:11px;color:#bbb"> / ${marks[pNum]}</span>
                            <button style="border:none;background:none;cursor:pointer;font-size:16px;" onclick="openDrawer('${id}','${y} ${sess} V${v} P${pNum}')">📝</button>
                        </td>`;
                    });
                    tbody.appendChild(tr);
                });
            });
        }
    }

    function valInput(input, max, id) {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (parseInt(input.value) > max) input.value = max;
        localStorage.setItem(id + '-m', input.value);
    }

    function openDrawer(id, label) { activePaperID = id; document.getElementById('nArea').value = localStorage.getItem(id + '-n') || ''; document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').style.display = 'block'; }
    function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
    function saveData() { localStorage.setItem(activePaperID + '-n', document.getElementById('nArea').value); closeDrawer(); }

    window.onload = init;
</script>
</body>
</html>
