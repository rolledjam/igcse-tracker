<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGCSE NEON SYSTEM 2026</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; min-height: 100vh; border: 5px solid var(--neon); box-sizing: border-box; box-shadow: inset 0 0 20px var(--neon); display: flex; flex-direction: column; }
        header { padding: 25px; text-align: center; background: #000; border-bottom: 2px solid #333; position: sticky; top:0; z-index:100; }
        h1 { font-family: 'Orbitron', sans-serif; margin: 0; text-shadow: 0 0 10px var(--neon); font-size: 1.5rem; letter-spacing: 2px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; width: 100%; box-sizing: border-box; flex: 1; }
        
        /* Dashboard UI */
        .search-area { text-align: center; margin-bottom: 30px; }
        #mainSearch { width: 100%; max-width: 500px; padding: 15px; background: #111; border: 1px solid #444; border-radius: 30px; color: #fff; font-family: 'Orbitron', sans-serif; text-align: center; font-size: 0.9rem; outline: none; transition: 0.3s; }
        #mainSearch:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }
        
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .sub-card { background: var(--card); border: 2px solid #333; border-radius: 12px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
        .sub-card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2); }
        .sub-card.selected { border-color: #39ff14; box-shadow: 0 0 15px #39ff14; }
        .sub-card h3 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; margin: 10px 0; color: #fff; }
        .sub-card p { font-size: 0.75rem; color: #666; font-weight: bold; margin: 0; letter-spacing: 1px; }

        /* Tracker UI */
        #trackerView { display: none; }
        .tab-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; border-bottom: 1px solid #222; }
        .tab-item { padding: 12px 24px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; white-space: nowrap; transition: 0.3s; }
        .tab-item.active { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); color: var(--neon); }
        
        .card { background: #111; border-radius: 15px; padding: 15px; border: 1px solid #333; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        th { font-family: 'Orbitron'; color: #666; font-size: 0.65rem; padding: 12px; text-transform: uppercase; }
        td { background: #0a0a0a; padding: 10px; text-align: center; border-top: 1px solid #222; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .year-cell { font-family: 'Orbitron'; background: #1a1a1a !important; font-weight: bold; }
        .mark-box { background: transparent; border: 1px solid #333; color: var(--neon); width: 45px; text-align: center; font-size: 11px; padding: 5px; border-radius: 4px; font-family: 'Orbitron'; outline: none; }

        /* Navigation Buttons */
        .nav-btn { position: fixed; bottom: 30px; right: 30px; background: var(--neon); color: #000; padding: 18px 30px; border-radius: 40px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 0 25px var(--neon); z-index: 1000; display: none; }
        .back-btn { position: fixed; bottom: 30px; left: 30px; background: #222; color: #fff; padding: 12px 25px; border-radius: 40px; cursor: pointer; border: 1px solid #444; font-family: 'Orbitron'; display: none; z-index: 1000; }

        /* Mistakes Drawer */
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; z-index:1500; backdrop-filter: blur(4px); }
        #drawer { position: fixed; right: -450px; top: 0; width: 380px; height: 100%; background: #000; border-left: 4px solid var(--neon); padding: 40px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; overflow-y: auto; box-sizing: border-box; }
        #drawer.open { right: 0; }
        textarea { width: 100%; height: 200px; background: #111; color: #fff; border: 1px solid #333; padding: 15px; margin-top: 15px; border-radius: 8px; resize: none; outline: none; font-family: 'Inter'; line-height: 1.5; }
        .save-btn { width: 100%; padding: 18px; background: #fff; color: #000; font-family: 'Orbitron'; font-weight: bold; border: none; cursor: pointer; margin-top: 25px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <header><h1>IGCSE SYSTEM 2026</h1></header>

    <div class="container" id="homeView">
        <div class="search-area">
            <input type="text" id="mainSearch" placeholder="SEARCH SUBJECT OR CODE (e.g. 0580)" onkeyup="filterGrid()">
        </div>
        <div id="dashboard"></div>
    </div>

    <div class="container" id="trackerView">
        <div class="tab-bar" id="trackerTabs"></div>
        <div class="card">
            <table>
                <thead><tr id="hRow"></tr></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
    </div>

    <button class="nav-btn" id="startBtn" onclick="launchTracker()">START TRACKING (0)</button>
    <button class="back-btn" id="backBtn" onclick="location.reload()">← DASHBOARD</button>

    <div id="overlay" onclick="closeDrawer()"></div>
    <div id="drawer">
        <h2 id="dHead" style="font-family:Orbitron; font-size:1.1rem; margin:0; color:var(--neon);">LOG_ERROR</h2>
        <textarea id="nArea" placeholder="Enter mistake details here..."></textarea>
        <button class="save-btn" onclick="saveData()">SAVE PROGRESS</button>
    </div>

<script>
    // FIXED SUBJECT LIST - No missing arrays
    const subjects = [
        { n: "Mathematics", c: "0580", p: [2, 4], m: (y) => y >= 2025 ? {2:100, 4:100} : {2:70, 4:130} },
        { n: "Physics", c: "0625", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}) },
        { n: "Chemistry", c: "0620", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}) },
        { n: "Biology", c: "0610", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}) },
        { n: "Computer Science", c: "0478", p: [1, 2], m: (y) => ({1:75, 2:75}) },
        { n: "Economics", c: "0455", p: [1, 2], m: (y) => ({1:30, 2:90}) },
        { n: "Accounting", c: "0452", p: [1, 2], m: (y) => ({1:35, 2:100}) },
        { n: "Business Studies", c: "0450", p: [1, 2], m: (y) => ({1:80, 2:80}) },
        { n: "ICT", c: "0417", p: [1, 2, 3], m: (y) => ({1:80, 2:70, 3:70}) },
        { n: "English - First Lang", c: "0500", p: [1, 2], m: (y) => ({1:80, 2:80}) },
        { n: "English Literature", c: "0475", p: [1, 2], m: (y) => ({1:50, 2:50}) },
        { n: "Environmental Mgmt", c: "0680", p: [1, 2], m: (y) => ({1:80, 2:80}) },
        { n: "Additional Maths", c: "0606", p: [1, 2], m: (y) => ({1:80, 2:80}) },
        { n: "Coordinated Sciences", c: "0654", p: [2, 4, 6], m: (y) => ({2:40, 4:120, 6:60}) }
    ];

    let selectedIndices = [];
    let activeSubIdx = -1;
    let activePaperID = '';

    function initDashboard() {
        const grid = document.getElementById('dashboard');
        grid.innerHTML = '';
        subjects.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'sub-card';
            card.innerHTML = `<p>${s.c}</p><h3>${s.n}</h3>`;
            card.onclick = () => toggleSelect(i, card);
            grid.appendChild(card);
        });
    }

    function toggleSelect(idx, card) {
        if (selectedIndices.includes(idx)) {
            selectedIndices = selectedIndices.filter(i => i !== idx);
            card.classList.remove('selected');
        } else {
            selectedIndices.push(idx);
            card.classList.add('selected');
        }
        const btn = document.getElementById('startBtn');
        btn.innerText = `START TRACKING (${selectedIndices.length})`;
        btn.style.display = selectedIndices.length > 0 ? 'block' : 'none';
    }

    function filterGrid() {
        const val = document.getElementById('mainSearch').value.toUpperCase();
        const cards = document.querySelectorAll('.sub-card');
        cards.forEach(c => {
            c.style.display = c.innerText.toUpperCase().includes(val) ? 'block' : 'none';
        });
    }

    function launchTracker() {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('trackerView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';

        const tabContainer = document.getElementById('trackerTabs');
        tabContainer.innerHTML = '';
        selectedIndices.forEach(idx => {
            const tab = document.createElement('div');
            tab.className = 'tab-item';
            tab.innerText = subjects[idx].n;
            tab.onclick = () => switchTab(idx, tab);
            tabContainer.appendChild(tab);
        });
        if (selectedIndices.length > 0) switchTab(selectedIndices[0], tabContainer.firstChild);
    }

    function switchTab(idx, el) {
        activeSubIdx = idx;
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderTable();
    }

    function renderTable() {
        const s = subjects[activeSubIdx];
        document.getElementById('hRow').innerHTML = `<th>YEAR</th><th>SESS</th><th>VAR</th>` + s.p.map(p => `<th>P${p}</th>`).join('');
        const tbody = document.getElementById('tBody');
        tbody.innerHTML = '';

        for (let y = 2025; y >= 2010; y--) {
            const marks = s.m(y);
            ['Feb/Mar', 'May/Jun', 'Oct/Nov'].forEach(sess => {
                [1, 2, 3].forEach(v => {
                    const rowID = `RJ-${s.c}-${y}-${sess}-${v}`;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="year-cell">${y}</td><td style="color:#666;font-size:10px">${sess}</td><td style="color:#444">V${v}</td>`;
                    s.p.forEach(p => {
                        const id = rowID + '-p' + p;
                        const score = localStorage.getItem(id + '-m') || '';
                        const checked = localStorage.getItem(id) === 'true' ? 'checked' : '';
                        tr.innerHTML += `<td>
                            <input type="checkbox" ${checked} onchange="localStorage.setItem('${id}', this.checked)">
                            <input type="text" class="mark-box" placeholder="0" value="${score}" onchange="localStorage.setItem('${id}-m', this.value)">
                            <span style="font-size:9px;color:#333">/${marks[p]}</span>
                            <button style="background:none;border:none;cursor:pointer;opacity:0.3;" onclick="openDrawer('${id}','${y} ${sess} V${v} P${p}')">📝</button>
                        </td>`;
                    });
                    tbody.appendChild(tr);
                });
            });
        }
    }

    function openDrawer(id, label) {
        activePaperID = id;
        document.getElementById('dHead').innerText = label;
        document.getElementById('nArea').value = localStorage.getItem(id + '-n') || '';
        document.getElementById('drawer').classList.add('open');
        document.getElementById('overlay').style.display = 'block';
    }

    function closeDrawer() {
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    }

    function saveData() {
        localStorage.setItem(activePaperID + '-n', document.getElementById('nArea').value);
        closeDrawer();
    }

    // Initialize
    window.onload = initDashboard;
</script>
</body>
</html>
